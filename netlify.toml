# Netlify configuration for Lake & Lederman Cost Segregation
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."         # the folder Netlify serves (root of the repo)
  # No build command needed — this is a static site, no compiler.

# Security & SEO headers applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "geolocation=(), microphone=(), camera=()"
    # CSP allows Tailwind/Alpine CDNs and inline styles required by Tailwind JIT
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; form-action 'self';"

# Cache the static HTML aggressively-but-revalidate-on-deploy
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Long cache for any future asset files
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
